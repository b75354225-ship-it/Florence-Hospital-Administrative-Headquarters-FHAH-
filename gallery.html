<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Florence Hospital (FHAH)</title>
<link rel="icon" href="images/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="gallery">
<div id="site-header"></div>

<header class="page-hero">
    <div class="container">
        <h1>Photo Gallery</h1>
        <p class="crumb"><a href="index.html">Home</a> / Gallery</p>
    </div>
</header>

<main>
    <section>
        <div class="container">
            <div class="section-title">
                <span class="eyebrow">Around FHAH</span>
                <h2>A Look Inside Our Hospital</h2>
                <p>Click any photo to view it larger.</p>
            </div>
            <div class="grid grid-3">
                <div class="card" data-lightbox="images/hospital-building.jpg"><img src="images/hospital-building.jpg" alt="Hospital building exterior"><div class="card-body"><h3>Hospital Building</h3></div></div>
                <div class="card" data-lightbox="images/waiting-lounge.jpg"><img src="images/waiting-lounge.jpg" alt="Patient waiting lounge"><div class="card-body"><h3>Patient Lounge</h3></div></div>
                <div class="card" data-lightbox="images/operating-theatre.jpg"><img src="images/operating-theatre.jpg" alt="Operating theatre"><div class="card-body"><h3>Operating Theatre</h3></div></div>
                <div class="card" data-lightbox="images/laboratory.jpg"><img src="images/laboratory.jpg" alt="Modern laboratory"><div class="card-body"><h3>Laboratory</h3></div></div>
                <div class="card" data-lightbox="images/pharmacy.jpg"><img src="images/pharmacy.jpg" alt="Pharmacy counter"><div class="card-body"><h3>Pharmacy</h3></div></div>
                <div class="card" data-lightbox="images/staff-team.jpg"><img src="images/staff-team.jpg" alt="Healthcare staff team"><div class="card-body"><h3>Our Team</h3></div></div>
            </div>
        </div>
    </section>
</main>

<div id="site-footer"></div>
<script src="js/include.js"></script>
<script src="js/main.js"></script>
</body>
</html>
